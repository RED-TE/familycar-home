<script type="module">
/* =========================
   Firebase 관리자판 버전
   ========================= */
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';
import {
  getFirestore, collection, getDocs, query, orderBy, limit, startAfter,
  where, updateDoc, doc, getDoc
} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

/* 1) 여기에 너의 firebaseConfig 붙여넣기 */
 const firebaseConfig = {
      apiKey: "AIzaSyDb-hOB-YOvtGvMZLyUXLz4nmwGaSOMrco",
      authDomain: "familycar-home.firebaseapp.com",
      projectId: "familycar-home",
      storageBucket: "familycar-home.firebasestorage.app",
      messagingSenderId: "69504878653",
      appId: "1:69504878653:web:fca733d65e5fc7c126c254"
    };
initializeApp(firebaseConfig);
const auth = getAuth();
const db   = getFirestore();

/* === 기존 DOM 참조 === */
const loginView = document.getElementById('loginView');
const dashView  = document.getElementById('dashView');
const loginMsg  = document.getElementById('loginMsg');
const userBadge = document.getElementById('userBadge');

const qEl        = document.getElementById('q');
const statusEl   = document.getElementById('status');
const pageSizeEl = document.getElementById('pageSize');
const dateRangeEl= document.getElementById('dateRange');
const loadingEl  = document.getElementById('loading');
const countEl    = document.getElementById('count');
const tbody      = document.querySelector('#tbl tbody');

let page = 1, total = 0;
let currentRows = [];         // 클라이언트에 모아둔 데이터(간편 페이지네이션)
let rawDocs = [];             // Firestore 문서 스냅샷(상세/업데이트에 사용)

/* === 로그인/로그아웃 === */
document.getElementById('btnLogin').addEventListener('click', async ()=>{
  loginMsg.textContent = '';
  const email = (document.getElementById('email').value||'').trim();
  const password = document.getElementById('password').value||'';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged 에서 화면 전환
  } catch (e) {
    loginMsg.textContent = e.message || '로그인 실패';
  }
});
document.getElementById('btnLogout').addEventListener('click', async ()=>{
  await signOut(auth); location.reload();
});
onAuthStateChanged(auth, async (user)=>{
  if (user) { userBadge.textContent = user.email || '관리자';
              showDash(); }
  else { showLogin(); }
});

function showLogin(){ loginView.style.display='grid'; dashView.style.display='none'; }
function showDash(){  loginView.style.display='none'; dashView.style.display='block'; load(); }

/* === 목록 로딩 ===
   - 간단히: 조건으로 Firestore에서 최대 500건 가져와
   - 화면에서 검색/필터/페이지네이션은 클라이언트에서 처리 */
async function load(){
  loadingEl.style.display = 'block';

  // Firestore 기본 쿼리
  let cond = [ orderBy('created_at','desc') ];
  // 날짜 범위
  const now = new Date();
  if (dateRangeEl.value === 'today') {
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    cond.push(where('created_at','>=', start));
  } else if (dateRangeEl.value === '7d') {
    const start = new Date(now.getTime() - 7*24*3600*1000).toISOString();
    cond.push(where('created_at','>=', start));
  }
  // 상태 필터
  if (statusEl.value !== 'all') {
    cond.push(where('status','==', statusEl.value));
  }

  const baseQ = query(collection(db,'inquiries'), ...cond, limit(500)); // 최대 500
  const snap = await getDocs(baseQ);

  // 캐시
  rawDocs = snap.docs;
  currentRows = rawDocs.map(d=>{
    const r = d.data();
    return { ...r, id: d.id };
  });

  // 텍스트 검색 (이름/연락처/브랜드/상품/모델/조건/메시지)
  const s = qEl.value.trim().toLowerCase();
  if (s) {
    currentRows = currentRows.filter(r => [
      r.name, r.phone, r.brand, r.product, r.model, r.terms, r.message
    ].some(v => (v||'').toString().toLowerCase().includes(s)));
  }

  // 최신순 정렬(안전)
  currentRows.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

  total = currentRows.length;
  page  = 1; // 첫 페이지부터
  renderPage();
  loadingEl.style.display = 'none';
}

function renderPage(){
  const size = Number(pageSizeEl.value);
  const from = (page-1)*size;
  const to   = from + size;
  const pageRows = currentRows.slice(from, to);
  renderRows(pageRows);
  countEl.textContent = `총 ${total}건 · ${page}/${Math.max(1, Math.ceil(total/size))}페이지`;
}

/* === 테이블 렌더 === */
function renderRows(rows){
  tbody.innerHTML = '';
  for(const r of rows){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap">${fmtDate(r.created_at)}</td>
      <td><div class="kv"><b>${esc(r.name)||'-'}</b></div></td>
      <td>
        <div>${esc(fmtPhone(r.phone))||'-'}</div>
        <button class="btn small" data-copy="${esc(r.phone)||''}">복사</button>
      </td>
      <td><div>${esc(r.brand)||'-'} / ${esc(r.product)||'-'}</div></td>
      <td><div>${esc(r.model)||'-'}<br><span style="color:#64748b">${esc(r.terms)||''}</span></div></td>
      <td>
        <div style="max-width:280px;white-space:pre-wrap">${esc(r.memo||'')}</div>
        <button class="btn small" data-memo="${r.id}">메모</button>
      </td>
      <td>
        <select data-status="${r.id}" class="select">
          <option value="absent"    ${r.status==='absent'?'selected':''}>부재</option>
          <option value="potential" ${r.status==='potential'?'selected':''}>가망</option>
          <option value="rejected"  ${r.status==='rejected'?'selected':''}>부결</option>
          <option value="contract"  ${r.status==='contract'?'selected':''}>계약</option>
        </select>
      </td>
      <td><button class="btn small" data-detail="${r.id}">상세</button></td>`;
    tbody.appendChild(tr);
  }
}

/* === 이벤트들 === */
document.getElementById('btnRefresh').onclick = ()=>{ page=1; load(); }
document.getElementById('prev').onclick = ()=>{ if(page>1){ page--; renderPage(); } }
document.getElementById('next').onclick = ()=>{ const size=Number(pageSizeEl.value);
  if(page*size < total){ page++; renderPage(); } }
qEl.oninput        = debounce(()=>{ load(); }, 300);
statusEl.onchange  = ()=>{ load(); }
pageSizeEl.onchange= ()=>{ page=1; renderPage(); }
dateRangeEl.onchange=()=>{ load(); }

tbody.addEventListener('click', async (e)=>{
  const btn = e.target.closest('[data-copy]');
  if(btn){ await navigator.clipboard.writeText(btn.dataset.copy||'');
           btn.textContent='복사됨'; setTimeout(()=>btn.textContent='복사',1200); }

  const detailBtn = e.target.closest('[data-detail]');
  if(detailBtn){
    const id = detailBtn.dataset.detail;
    const d  = rawDocs.find(x=>x.id===id);
    if(!d){ alert('데이터 없음'); return; }
    showDetail({ id, ...d.data() });
  }

  const memoBtn = e.target.closest('[data-memo]');
  if(memoBtn){ openMemo(memoBtn.dataset.memo); }
});

tbody.addEventListener('change', async (e)=>{
  const sel = e.target.closest('select[data-status]');
  if(!sel) return;
  try {
    await updateDoc(doc(db,'inquiries', sel.dataset.status), { status: sel.value });
  } catch(err){
    alert('상태 업데이트 실패: '+(err.message||err));
    load();
  }
});

/* === 상세/메모 === */
function showDetail(r){
  const detail = [
    `작성: ${fmtDate(r.created_at)}`,
    `이름: ${r.name||'-'}`,
    `연락처: ${r.phone||'-'}`,
    `브랜드/상품: ${r.brand||'-'} / ${r.product||'-'}`,
    `차종: ${r.model||'-'}`,
    `조건: ${r.terms||'-'}`,
    `메시지: ${r.message||'-'}`,
    `상태: ${r.status}`,
    `Referrer: ${r.referrer||'-'}`,
    `UTM: ${JSON.stringify(r.utm||{})}`,
    `UA: ${r.user_agent||'-'}`,
    `페이지: ${r.page||'-'}`,
    `ID: ${r.id}`
  ].join('\n');
  document.getElementById('detailBody').textContent = detail;
  document.getElementById('detailModal').style.display = 'flex';
}
const memoModal=document.getElementById('memoModal');
let memoTargetId=null;
function openMemo(id){ memoTargetId=id; (document.getElementById('memoText').value=''); memoModal.style.display='flex'; }
document.getElementById('saveMemo').onclick = async ()=>{
  if(!memoTargetId){ memoModal.style.display='none'; return; }
  const memo = document.getElementById('memoText').value||'';
  try{
    await updateDoc(doc(db,'inquiries', memoTargetId), { memo });
  }catch(e){ alert('메모 저장 실패: '+(e.message||e)); }
  memoModal.style.display='none'; load();
};
document.addEventListener('click', (e)=>{
  if(e.target.matches('[data-close]')){
    memoModal.style.display='none';
    const dm = document.getElementById('detailModal');
    if(dm) dm.style.display='none';
  }
});

/* === CSV 내보내기 === */
document.getElementById('btnExport').onclick = ()=>{
  const rows = currentRows;
  const cols = ['created_at','name','phone','brand','product','model','terms','message','status','referrer','utm','user_agent','page','memo','id'];
  const header = cols.join(',');
  const lines = rows.map(r => cols.map(c=>{
    let v = r[c];
    if(typeof v === 'object' && v !== null) v = JSON.stringify(v);
    v = (v ?? '').toString().replaceAll('"','""');
    return `"${v}"`;
  }).join(','));
  const csv = [header, ...lines].join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href=url; a.download=`inquiries_${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
};

/* === 유틸 === */
function esc(s){ return (s??'').toString().replace(/[&<>\"]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function fmtDate(s){ try{ const d=new Date(s); return d.toLocaleString('ko-KR'); }catch(_){ return s; } }
function fmtPhone(s){
  if(!s) return '';
  const d = (s+'').replace(/\D/g,'');
  if(d.length === 10) return d.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  if(d.length === 11) return d.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
  return s;
}
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

/* 초기 진입은 auth 상태 리스너(onAuthStateChanged)가 처리 */
</script>
